name: Build Semantica (Tauri)

on:
  push:
    tags:
      - 'v[1-9]*'     # Tauri builds from v1.x.x onwards
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            semantica-tauri/src-tauri/target/
          key: macos-cargo-${{ hashFiles('semantica-tauri/src-tauri/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build universal macOS DMG
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: semantica-tauri
          args: --target universal-apple-darwin

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Semantica-mac
          path: semantica-tauri/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            semantica-tauri/src-tauri/target/
          key: windows-cargo-${{ hashFiles('semantica-tauri/src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build Windows installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: semantica-tauri

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Semantica-windows
          path: |
            semantica-tauri/src-tauri/target/release/bundle/nsis/*.exe
            semantica-tauri/src-tauri/target/release/bundle/msi/*.msi
