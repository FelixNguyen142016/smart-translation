name: Build VocabAI Desktop

on:
  push:
    tags:
      - 'v*'          # triggers on v0.1.0-beta.1, v1.0.0, etc.
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd desktop && npm install

      - name: Build macOS DMG
        run: cd desktop && npm run build:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VocabAI-mac
          path: desktop/dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd desktop && npm install

      - name: Build Windows installer
        run: cd desktop && npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VocabAI-windows
          path: desktop/dist/*.exe
