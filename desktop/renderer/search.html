<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semantica Search</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .search-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22), 0 4px 16px rgba(0, 0, 0, 0.12);
      padding: 0 18px;
      gap: 12px;
      -webkit-app-region: drag; /* allow dragging the bar */
    }

    html.dark .search-wrap {
      background: rgba(15, 23, 42, 0.92);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .search-icon {
      font-size: 18px;
      opacity: 0.4;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    #search-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 17px;
      font-weight: 500;
      color: #0f172a;
      outline: none;
      -webkit-app-region: no-drag;
    }

    html.dark #search-input { color: #e2e8f0; }

    #search-input::placeholder { color: #94a3b8; font-weight: 400; }

    .kbd-hint {
      font-size: 11px;
      color: #94a3b8;
      background: rgba(0,0,0,0.05);
      border-radius: 6px;
      padding: 3px 7px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    html.dark .kbd-hint { background: rgba(255,255,255,0.06); }
  </style>
</head>
<body>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search-input" type="text" placeholder="Search or look up a word…" autocomplete="off" spellcheck="false" />
    <span class="kbd-hint">↵ search &nbsp; esc close</span>
  </div>
  <script src="./search.js" type="module"></script>
</body>
</html>
