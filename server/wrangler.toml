name = "smart-translation-api"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database (vocab, users, auth) ──────────────────────────────────────────
# Run: npx wrangler d1 create smart-translation-db
# Then paste the database_id here.
[[d1_databases]]
binding = "DB"
database_name = "smart-translation-db"
database_id = "624bc5ad-25ff-4296-be2c-847112efe75b"

# ── KV Namespace (AI result cache + rate limit counters) ──────────────────────
# Run: npx wrangler kv:namespace create CACHE
# Run: npx wrangler kv:namespace create CACHE --preview
# Then paste the ids here.
[[kv_namespaces]]
binding = "CACHE"
id = "132f13f0b38a4d4186430b30a90024cc"
preview_id = "3dd14456c4864a359235340f492645d5"

# ── Smart Placement ───────────────────────────────────────────────────────────
# Runs the Worker close to the backend (Anthropic US), not the user.
# Fixes "Claude API 403" for users in regions where Cloudflare's local DCs
# are blocked by Anthropic (e.g. Vietnam, some SEA regions).
[placement]
mode = "smart"

# ── SePay billing ──────────────────────────────────────────────────────────
# Bank account the VietQR codes point to. Not secret — these are the same
# values printed on any invoice, and qr.sepay.vn/img is a public unauthenticated
# endpoint. Get the exact bank name string from https://qr.sepay.vn/banks.json.
[vars]
SEPAY_BANK_ACCOUNT = "0393899818"
SEPAY_BANK_NAME = "MBBank"
# Base URL for the token.ai.vn OpenAI-compatible endpoint (definition/example
# generation, see _callGPTDefinition in analyze.js). Confirmed via curl test:
# token.ai.vn runs "One Hub" (a self-hosted OpenAI-proxy gateway), which uses
# the standard OpenAI path convention — POST {base}/v1/chat/completions, hence
# the /v1 baked into this URL (analyze.js appends only "/chat/completions").
# Not secret — it's just a hostname, like the DeepL host.
TOKENAI_BASE_URL = "https://token.ai.vn/v1"
# Model requested from token.ai.vn. Must be one of the models the account's
# token actually exposes (the "Loaded N models from your account" list in any
# OpenAI-compatible client) — requesting an unavailable model makes One Hub
# refuse the call even with valid auth. gpt-4.1-mini confirmed available on
# this account (20-07).
TOKENAI_MODEL = "gpt-4.1-mini"

# ── Secrets (never commit actual values) ──────────────────────────────────────
# After setup, run:
#   npx wrangler secret put ANTHROPIC_KEY
#   npx wrangler secret put DEEPL_KEY
#   npx wrangler secret put RESEND_KEY
#   npx wrangler secret put SEPAY_WEBHOOK_KEY   # matches the API Key you set in the SePay dashboard's webhook Security step
#   npx wrangler secret put TOKENAI_KEY         # token.ai.vn API key (definition/example generation)
